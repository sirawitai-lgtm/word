version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_webpj
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webpj
    ports:
      - "8500:3306"
    volumes:
      - mysql_webpj:/var/lib/mysql
    networks:
      - webpj
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_700
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    ports:
      - "8501:80"
    depends_on:
      - db
    networks:
      - webpj
    restart: always

networks:
  webpj:
    driver: bridge

volumes:
  mysql_webpj:
    driver: local
  
